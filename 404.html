<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, follow">
    <title>Seite nicht gefunden | BuiltSmart AI</title>
    <link rel="icon" href="/assets/favicon/favicon.svg" type="image/svg+xml">
    <style>
      :root {
        color-scheme: light;
        --ink: #05050f;
        --muted: #5d6872;
        --paper: #f7f8f5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 32px;
        color: var(--ink);
        background: var(--paper);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      main {
        width: min(760px, 100%);
      }

      p {
        max-width: 560px;
        margin: 24px 0 0;
        color: var(--muted);
        font-size: clamp(1.15rem, 2vw, 1.35rem);
        line-height: 1.45;
      }

      .eyebrow {
        margin: 0 0 18px;
        color: #48c7b0;
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(3.4rem, 8vw, 6.8rem);
        line-height: 0.95;
        font-weight: 880;
        letter-spacing: 0;
      }

      a {
        display: inline-flex;
        min-height: 48px;
        margin-top: 34px;
        align-items: center;
        justify-content: center;
        padding: 0 20px;
        color: #ffffff;
        background: #172026;
        border-radius: 8px;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">404</p>
      <h1>Diese Seite wurde nicht gefunden.</h1>
      <p>Die angeforderte Adresse existiert nicht oder wurde verschoben. Zurück zur BuiltSmart AI Landingpage.</p>
      <a href="/">Zur Startseite</a>
    </main>
  </body>
</html>
