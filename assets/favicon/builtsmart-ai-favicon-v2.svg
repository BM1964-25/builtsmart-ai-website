<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">BuiltSmart AI Favicon Variant 2</title>
  <desc id="desc">Premium dark AI favicon with larger lettering and teal gold accent.</desc>
  <defs>
    <radialGradient id="bg" cx="34%" cy="24%" r="86%">
      <stop offset="0%" stop-color="#1f4650"/>
      <stop offset="42%" stop-color="#071319"/>
      <stop offset="100%" stop-color="#020405"/>
    </radialGradient>
    <linearGradient id="accentRing" x1="100" x2="420" y1="82" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#65f0d2"/>
      <stop offset="54%" stop-color="#48c7b0"/>
      <stop offset="100%" stop-color="#d7a64a"/>
    </linearGradient>
    <linearGradient id="letterGlow" x1="176" x2="342" y1="160" y2="346" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dff8f2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.52"/>
    </filter>
    <filter id="textShadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="#020405"/>
  <circle cx="256" cy="256" r="214" fill="url(#bg)" filter="url(#shadow)"/>
  <circle cx="256" cy="256" r="214" fill="none" stroke="url(#accentRing)" stroke-width="14"/>
  <circle cx="256" cy="256" r="184" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="4"/>
  <path d="M122 348c40 22 85 33 134 33 51 0 98-12 139-36" fill="none"
        stroke="#d7a64a" stroke-width="18" stroke-linecap="round" opacity="0.8"/>
  <path d="M132 158c36-21 77-31 124-31 46 0 88 10 124 31" fill="none"
        stroke="#65f0d2" stroke-width="16" stroke-linecap="round" opacity="0.65"/>
  <text x="256" y="267" text-anchor="middle" dominant-baseline="middle"
        fill="url(#letterGlow)" font-family="Inter, Arial, Helvetica, sans-serif"
        font-size="204" font-weight="900" letter-spacing="-12" filter="url(#textShadow)">AI</text>
</svg>
