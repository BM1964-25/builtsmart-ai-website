<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">BuiltSmart AI Favicon Variant 3</title>
  <desc id="desc">Premium AI favicon with dark ring, large AI lettering and three colored layer bars.</desc>
  <defs>
    <radialGradient id="bgGlow" cx="31%" cy="22%" r="82%">
      <stop offset="0%" stop-color="#24455f"/>
      <stop offset="40%" stop-color="#09131d"/>
      <stop offset="100%" stop-color="#030609"/>
    </radialGradient>
    <linearGradient id="ring" x1="92" x2="420" y1="70" y2="442" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7fb6ff"/>
      <stop offset="38%" stop-color="#48c7b0"/>
      <stop offset="66%" stop-color="#f4ad28"/>
      <stop offset="100%" stop-color="#d9483d"/>
    </linearGradient>
    <linearGradient id="redLayer" x1="132" x2="338" y1="172" y2="172" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff5a67"/>
      <stop offset="45%" stop-color="#d7192d"/>
      <stop offset="100%" stop-color="#8f0614"/>
    </linearGradient>
    <linearGradient id="blueLayer" x1="124" x2="350" y1="230" y2="230" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#19c4ff"/>
      <stop offset="48%" stop-color="#0868f8"/>
      <stop offset="100%" stop-color="#043276"/>
    </linearGradient>
    <linearGradient id="goldLayer" x1="116" x2="362" y1="288" y2="288" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffd66b"/>
      <stop offset="45%" stop-color="#f2a51b"/>
      <stop offset="100%" stop-color="#9c5709"/>
    </linearGradient>
    <linearGradient id="letterGlow" x1="166" x2="352" y1="150" y2="352" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8f8f5"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="textShadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="116" fill="#030609"/>
  <circle cx="256" cy="256" r="212" fill="url(#bgGlow)" filter="url(#softShadow)"/>
  <circle cx="256" cy="256" r="212" fill="none" stroke="url(#ring)" stroke-width="12" opacity="0.96"/>
  <circle cx="256" cy="256" r="184" fill="none" stroke="#ffffff" stroke-opacity="0.07" stroke-width="3"/>
  <g opacity="0.94" filter="url(#softShadow)">
    <path d="M136 166c0-13 10-23 23-23h150c13 0 23 10 23 23s-10 23-23 23H159c-13 0-23-10-23-23Z" fill="url(#redLayer)"/>
    <path d="M124 224c0-14 11-25 25-25h174c14 0 25 11 25 25s-11 25-25 25H149c-14 0-25-11-25-25Z" fill="url(#blueLayer)"/>
    <path d="M112 282c0-15 12-27 27-27h198c15 0 27 12 27 27s-12 27-27 27H139c-15 0-27-12-27-27Z" fill="url(#goldLayer)"/>
  </g>
  <text x="274" y="272" text-anchor="middle" dominant-baseline="middle"
        fill="url(#letterGlow)" font-family="Inter, Arial, Helvetica, sans-serif"
        font-size="204" font-weight="900" letter-spacing="-12" filter="url(#textShadow)">AI</text>
  <path d="M168 164c31-26 66-39 106-39 29 0 57 8 82 23" fill="none"
        stroke="#ffffff" stroke-width="10" stroke-linecap="round" opacity="0.16"/>
</svg>
