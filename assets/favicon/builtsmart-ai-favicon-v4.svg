<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">BuiltSmart AI Favicon Variant 4</title>
  <desc id="desc">Elegant dark favicon with white circle, white button and bold AI lettering.</desc>
  <defs>
    <radialGradient id="bg" cx="34%" cy="24%" r="84%">
      <stop offset="0%" stop-color="#22384a"/>
      <stop offset="48%" stop-color="#071017"/>
      <stop offset="100%" stop-color="#020405"/>
    </radialGradient>
    <linearGradient id="button" x1="142" x2="370" y1="196" y2="318" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="54%" stop-color="#f5f7f8"/>
      <stop offset="100%" stop-color="#dfe6e8"/>
    </linearGradient>
    <linearGradient id="buttonEdge" x1="146" x2="366" y1="190" y2="322" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#b8c4ca"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.48"/>
    </filter>
    <filter id="buttonShadow" x="-24%" y="-36%" width="148%" height="172%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.44"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="116" fill="#020405"/>
  <circle cx="256" cy="256" r="212" fill="url(#bg)" filter="url(#shadow)"/>
  <circle cx="256" cy="256" r="214" fill="none" stroke="#ffffff" stroke-width="12" opacity="0.88"/>
  <circle cx="256" cy="256" r="184" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.1"/>

  <g filter="url(#buttonShadow)">
    <rect x="128" y="178" width="256" height="156" rx="58" fill="url(#buttonEdge)" opacity="0.98"/>
    <rect x="136" y="186" width="240" height="140" rx="52" fill="url(#button)"/>
    <path d="M170 207c27-16 57-24 91-24 30 0 57 6 81 18" fill="none"
          stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.68"/>
  </g>

  <text x="256" y="265" text-anchor="middle" dominant-baseline="middle"
        fill="#071017" font-family="Inter, Arial, Helvetica, sans-serif"
        font-size="154" font-weight="900" letter-spacing="-8">AI</text>

  <path d="M162 360c28 21 59 31 94 31 36 0 68-11 96-33" fill="none"
        stroke="#48c7b0" stroke-width="10" stroke-linecap="round" opacity="0.62"/>
</svg>
