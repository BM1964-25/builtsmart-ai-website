<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">BuiltSmart AI Favicon</title>
  <desc id="desc">Dark circular AI mark with subtle BuiltSmart accent lines.</desc>
  <defs>
    <radialGradient id="bgGlow" cx="31%" cy="22%" r="80%">
      <stop offset="0%" stop-color="#24455f"/>
      <stop offset="42%" stop-color="#09131d"/>
      <stop offset="100%" stop-color="#030609"/>
    </radialGradient>
    <linearGradient id="ring" x1="92" x2="420" y1="70" y2="442" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#78d8ff"/>
      <stop offset="42%" stop-color="#48c7b0"/>
      <stop offset="72%" stop-color="#f2a51b"/>
      <stop offset="100%" stop-color="#d9483d"/>
    </linearGradient>
    <linearGradient id="layerBlue" x1="140" x2="372" y1="254" y2="254" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10a7ff"/>
      <stop offset="100%" stop-color="#174ea6"/>
    </linearGradient>
    <linearGradient id="layerGold" x1="150" x2="362" y1="314" y2="314" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f5bc38"/>
      <stop offset="100%" stop-color="#c77711"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="116" fill="#030609"/>
  <circle cx="256" cy="256" r="212" fill="url(#bgGlow)" filter="url(#softShadow)"/>
  <circle cx="256" cy="256" r="212" fill="none" stroke="url(#ring)" stroke-width="12" opacity="0.96"/>
  <circle cx="256" cy="256" r="184" fill="none" stroke="#ffffff" stroke-opacity="0.07" stroke-width="3"/>
  <path d="M150 306c0-13 10-23 23-23h166c13 0 23 10 23 23s-10 23-23 23H173c-13 0-23-10-23-23Z" fill="url(#layerGold)" opacity="0.9"/>
  <path d="M132 245c0-14 11-25 25-25h198c14 0 25 11 25 25s-11 25-25 25H157c-14 0-25-11-25-25Z" fill="url(#layerBlue)" opacity="0.92"/>
  <text x="256" y="260" text-anchor="middle" dominant-baseline="middle"
        fill="#ffffff" font-family="Inter, Arial, Helvetica, sans-serif"
        font-size="154" font-weight="850" letter-spacing="-8">AI</text>
  <path d="M168 164c31-26 66-39 106-39 29 0 57 8 82 23" fill="none"
        stroke="#ffffff" stroke-width="10" stroke-linecap="round" opacity="0.16"/>
